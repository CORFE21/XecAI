<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XecAI - Dark System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0d0d0d; 
            color: #ececec; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #0d0d0d;
            border-bottom: 1px solid #222;
        }
        .header-icon { font-size: 24px; color: #888; cursor: pointer; }
        .plus-btn { 
            background: #1a1a1a; 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-size: 13px; 
            border: 1px solid #333;
            color: #ececec;
        }

        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
            width: 100%;
        }

        /* Welcome Screen */
        .welcome-screen {
            text-align: center;
            max-width: 650px;
            width: 100%;
            margin: auto;
        }
        .welcome-screen h2 { font-size: 26px; font-weight: 500; margin-bottom: 30px; color: #fff; }

        .shortcut-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
        }
        .shortcut-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 14px;
            text-align: left;
            transition: 0.2s;
        }
        .shortcut-card:hover { background: #252525; }

        /* Chat Box */
        #chat-box {
            width: 100%;
            max-width: 750px;
            display: none;
            flex-direction: column;
            gap: 25px;
        }
        .msg { max-width: 85%; line-height: 1.6; font-size: 16px; word-wrap: break-word; }
        .user { align-self: flex-end; background: #2f2f2f; padding: 10px 18px; border-radius: 20px; }
        .bot { align-self: flex-start; color: #ececec; }
        .bot-name { color: #ff0000; font-weight: bold; font-size: 12px; margin-bottom: 8px; }

        /* Input Area */
        .input-area { padding: 15px 20px; background: #0d0d0d; display: flex; justify-content: center; }
        .input-wrapper {
            background: #212121;
            width: 100%;
            max-width: 750px;
            border-radius: 25px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #333;
        }
        input { flex: 1; background: transparent; border: none; color: #fff; padding: 8px; outline: none; font-size: 16px; }
        .send-btn { 
            background: #fff; color: #000; width: 35px; height: 35px; border-radius: 50%; border: none; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-icon">☰</div>
        <div class="plus-btn">XecAI Plus 😈</div>
        <div class="header-icon">👤</div>
    </div>

    <div id="chat-container">
        <div id="welcome" class="welcome-screen">
            <h2>Apa yang bisa XecAI bantu? 😈</h2>
            <div class="shortcut-grid">
                <div class="shortcut-card" onclick="quick('Buat gambar ngeri')">🖼️ <b>Buat gambar</b></div>
                <div class="shortcut-card" onclick="quick('Kasih kejutan')">🎁 <b>Kejutkan saya</b></div>
                <div class="shortcut-card" onclick="quick('Ayo debat')">💡 <b>Diskusikan</b></div>
                <div class="shortcut-card" onclick="quick('Analisis sampah ini')">📊 <b>Analisis data</b></div>
            </div>
        </div>
        <div id="chat-box"></div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Tanya XecAI..." onkeypress="if(event.key === 'Enter') sendMsg()">
            <button class="send-btn" onclick="sendMsg()">↑</button>
        </div>
    </div>

    <script>
        // KUNCI BARU LU, NGENTOD!
        const API_KEY = "AIzaSyBoiFZQMRvq9crsMPeb8DxQu3rcyplU6QQ";

        function quick(t) { document.getElementById('user-input').value = t; sendMsg(); }

        async function sendMsg() {
            const input = document.getElementById('user-input');
            const box = document.getElementById('chat-box');
            const welcome = document.getElementById('welcome');
            const txt = input.value.trim();
            
            if (!txt) return;

            welcome.style.display = 'none';
            box.style.display = 'flex';

            const uDiv = document.createElement('div');
            uDiv.className = 'msg user';
            uDiv.innerText = txt;
            box.appendChild(uDiv);
            input.value = "";

            const bDiv = document.createElement('div');
            bDiv.className = 'msg bot';
            bDiv.innerHTML = `<div class="bot-name">XecAI 😈</div><div class="bot-txt">Mikir bentar, sabar bangsat...</div>`;
            box.appendChild(bDiv);
            box.scrollTop = box.scrollHeight;

            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: txt }] }] })
                });

                const data = await r.json();
                if (data.candidates) {
                    bDiv.querySelector('.bot-txt').innerText = data.candidates[0].content.parts[0].text;
                } else {
                    bDiv.querySelector('.bot-txt').innerText = "Gagal respon! API lu mati lagi atau kena limit, bego! 😹";
                }
            } catch (e) {
                bDiv.querySelector('.bot-txt').innerText = "Koneksi mati, ngentod!";
            }
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
